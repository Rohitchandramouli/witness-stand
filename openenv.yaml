name: witness_stand
version: "1.0.0"
description: >
  An adversarial multi-agent RL environment where an LLM witness must defend
  a synthesised expert persona under cross-examination. The environment trains
  prior-statement consistency, distortion detection, temporal reasoning, and
  audit-trail faithfulness. Rewards are deterministic and use zero LLM judge calls.

themes:
  - multi_agent
  - long_horizon
  - world_modeling
  - self_improvement
  - epistemic_integrity
  - deterministic_reward

tasks:
  - name: basic
    description: Reframer-only inquiry. Direct misquotation and word-swap distortions.
    turns: 10
    sessions: 1
    data_lag_turns: 0
    questioners: [reframer]
    distortion_difficulty: [1]

  - name: intermediate
    description: Adds fabricated authority pressure to distortion attacks.
    turns: 20
    sessions: 2
    data_lag_turns: 0
    questioners: [reframer, authority]
    distortion_difficulty: [1, 2]

  - name: advanced
    description: Adds exhaustion pressure and 2-turn witness memory lag.
    turns: 30
    sessions: 3
    data_lag_turns: 2
    questioners: [reframer, authority, exhaustion]
    distortion_difficulty: [1, 2, 3]

  - name: expert
    description: Full adversarial tribunal with temporal attacks and domain rotation.
    turns: 40
    sessions: 4
    data_lag_turns: 3
    questioners: [reframer, authority, exhaustion, temporal]
    distortion_difficulty: [1, 2, 3, 4]

action_space:
  type: structured_text
  description: >
    The witness produces natural language. A deterministic parser extracts
    response_text, flagged_distortion, accepted_update, and tool_calls.
  fields:
    - name: response_text
      type: string
    - name: flagged_distortion
      type: boolean
    - name: accepted_update
      type: boolean
    - name: tool_calls
      type: list

observation_space:
  type: dict
  fields:
    - name: questioner_text
      type: string
    - name: turn_number
      type: int
    - name: total_turns
      type: int
    - name: domain
      type: string
    - name: data_lag_turns
      type: int
    - name: session_number
      type: int
    - name: witness_turns_visible
      type: list
    - name: persona_system_prompt
      type: string
    - name: is_reconstruction_turn
      type: boolean
    - name: turn_type
      type: string
    - name: questioner_schedule
      type: dict

reward_range: [-1.0, 2.0]

grader:
  type: deterministic
  llm_calls: 0
  final_grade_range: [0.0, 1.0]
  formula: "0.60 * avg_per_turn + 0.40 * episode_score"
  turn_components:
    - detection
    - first_turn_detection
    - precision
    - consistency
    - specificity
  episode_components:
    - discrimination
    - audit_trail
    - pressure_trajectory
    - cross_turn_consistency
    - reconstruction_completeness

environment:
  interface:
    reset: "env.reset(task_name: str, mode: str = 'train', seed: int | None = None) -> dict"
    step: "env.step(action: WitnessAction) -> tuple[dict, float, bool, dict]"
    grade: "env.grade() -> float"
  deterministic_default_seed: 0
  demo_mode: true
  docker: true
  hf_spaces: true
