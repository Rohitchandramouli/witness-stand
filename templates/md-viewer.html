<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Markdown</title>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Optional: GitHub-like styling -->
  <style>
    body {
      background: #0f1115;
      color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: auto;
    }
    .container h1, .container h2, .container h3 {
      color: #fff;
    }
    .container code {
      background: #1e1e1e;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .container pre {
      background: #1e1e1e;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
    }
    .back {
      margin-bottom: 1.5rem;
      display: inline-block;
      color: #d4a820;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="index.html" class="back">← Back</a>
    <div id="content"></div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
fetch('https://raw.githubusercontent.com/ScriptedDemon/blog_md/main/blog.md')
  .then(res => res.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(err => {
    document.getElementById('content').innerHTML = "<p>Failed to load blog.</p>";
    console.error(err);
  });
</script>
</body>
</html>
